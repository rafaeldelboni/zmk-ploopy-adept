layout: {zmk_keyboard: AdeptBLE}
layers:
  Default:
  - {t: Back, h: Bluetooth}
  - {t: Fwd, h: Device}
  - {t: Snipe, h: toggle}
  - {t: MClick, h: Scroll}
  - LClick
  - RClick
  Bluetooth:
  - {type: held}
  - {t: BT, h: '0'}
  - {t: BT, h: '1'}
  - {t: BT, h: '2'}
  - {t: BT, h: '3'}
  - {t: BT, h: '4'}
  Device:
  - BOOT
  - {type: held}
  - OUT TOG
  - BT CLR ALL
  - '&sys_reset'
  - BTCLR
  Snipe:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: Default, h: toggle}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  Scroll:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: Scroll Lock, h: toggle}
  - {type: held}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  Scroll Lock:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: Default, h: toggle}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
