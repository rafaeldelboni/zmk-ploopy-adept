layout: {zmk_keyboard: AdeptBLE}
layers:
  Default:
  - {t: MB4, h: Bluetooth}
  - {t: MB5, h: Device}
  - MCLK
  - {t: RCLK, h: Scroll}
  - LCLK
  - {t: Snipe, h: Scroll}
  Scroll:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: Scroll Lock, h: toggle}
  - {type: held}
  - {t: Scroll Lock, h: toggle}
  - {t: ▽, type: trans}
  Scroll Lock:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: Default, h: toggle}
  - {t: ▽, type: trans}
  - {t: Default, h: toggle}
  Device:
  - BOOT
  - {type: held}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - BTCLR
  Bluetooth:
  - {type: held}
  - {t: BT, h: '0'}
  - {t: BT, h: '1'}
  - {t: BT, h: '2'}
  - {t: BT, h: '3'}
  - {t: BT, h: '4'}
  Snipe:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: RCLK, h: Scroll}
  - {t: ▽, type: trans}
  - {t: Default, h: toggle}
combos:
- p: [2, 3]
  k: RCLK
  a: top
